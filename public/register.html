<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>店長註冊 - 餐廳點餐系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .register-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }
        .register-header {
            background: white;
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .register-header h1 { font-size: 1.8rem; color: #005F73; margin-bottom: 8px; }
        .register-body { padding: 32px 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #005F73; }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 28px;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #005F73; box-shadow: 0 0 0 3px rgba(0,95,115,0.1); }
        .register-btn {
            width: 100%;
            background: #005F73;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }
        .register-btn:hover { background: #004a5a; transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 24px; color: #666; }
        .login-link a { color: #005F73; text-decoration: none; font-weight: bold; }
        .message {
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .info-text { font-size: 0.85rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <h1>📝 店長註冊</h1>
        <p>填寫基本資料，等待管理員審核</p>
    </div>
    <div class="register-body">
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>登入帳號 *</label>
            <input type="text" id="regUsername" placeholder="例如: my_restaurant">
            <div class="info-text">將用於登入後台及點餐頁面網址</div>
        </div>
        <div class="form-group">
            <label>登入密碼 *</label>
            <input type="password" id="regPassword" placeholder="至少4碼">
        </div>
        <div class="form-group">
            <label>電子信箱 *</label>
            <input type="email" id="regEmail" placeholder="your@example.com" required>
            <div class="info-text">用於密碼重設，請填寫真實信箱</div>
        </div>
        <div class="form-group">
            <label>餐廳名稱 *</label>
            <input type="text" id="restaurantName" placeholder="我的美味餐廳">
        </div>
        <div class="form-group">
            <label>餐廳 Logo (圖片網址)</label>
            <input type="text" id="logoUrl" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>背景圖片 (圖片網址)</label>
            <input type="text" id="bgImageUrl" placeholder="https://...">
        </div>
        <button class="register-btn" id="registerBtn">送出註冊申請</button>
        <div class="login-link">已有帳號？ <a href="login.html">立即登入</a></div>
    </div>
</div>
<script>
    const registerBtn = document.getElementById('registerBtn');
    const messageBox = document.getElementById('messageBox');

    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const email = document.getElementById('regEmail').value.trim();
        const restaurant_name = document.getElementById('restaurantName').value.trim();
        const logo_url = document.getElementById('logoUrl').value.trim();
        const background_image_url = document.getElementById('bgImageUrl').value.trim();

        if (!username || !password || !email || !restaurant_name) {
            showMessage('請填寫帳號、密碼、信箱及餐廳名稱', 'error');
            return;
        }
        if (password.length < 4) { showMessage('密碼長度至少4碼', 'error'); return; }
        // 簡單 Email 格式驗證
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            showMessage('請輸入有效的電子信箱', 'error');
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email, restaurant_name, logo_url, background_image_url })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '註冊失敗');
            showMessage('註冊成功！請等待超級管理員審核通過後即可登入。', 'success');
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('restaurantName').value = '';
            document.getElementById('logoUrl').value = '';
            document.getElementById('bgImageUrl').value = '';
            setTimeout(() => window.location.href = 'login.html', 2000);
        } catch (err) { showMessage(err.message, 'error'); }
    });

    function showMessage(msg, type) {
        messageBox.textContent = msg;
        messageBox.className = `message ${type}`;
        setTimeout(() => messageBox.style.display = 'none', 4000);
    }
</script>
</body>
</html>
