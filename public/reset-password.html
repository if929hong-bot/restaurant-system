<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>重設密碼 - 餐廳點餐系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }
        .header {
            background: white;
            padding: 32px 24px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #005F73;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 0.9rem;
        }
        .body {
            padding: 32px 28px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #005F73;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 28px;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #005F73;
            box-shadow: 0 0 0 3px rgba(0,95,115,0.1);
        }
        button {
            width: 100%;
            background: #005F73;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #004a5a;
            transform: translateY(-2px);
        }
        .message {
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔑 重設密碼</h1>
        <p>請設定新密碼</p>
    </div>
    <div class="body">
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>新密碼</label>
            <input type="password" id="newPassword" placeholder="至少4碼">
        </div>
        <div class="form-group">
            <label>確認新密碼</label>
            <input type="password" id="confirmPassword" placeholder="再次輸入新密碼">
        </div>
        <button id="resetBtn">重設密碼</button>
    </div>
</div>
<script>
    const resetBtn = document.getElementById('resetBtn');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmInput = document.getElementById('confirmPassword');
    const messageBox = document.getElementById('messageBox');

    // 從 URL 取得 token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showMessage('無效的重設連結，請重新申請。', 'error');
        resetBtn.disabled = true;
    }

    resetBtn.addEventListener('click', async () => {
        const newPassword = newPasswordInput.value;
        const confirm = confirmInput.value;

        if (!newPassword || newPassword.length < 4) {
            showMessage('密碼長度至少4碼', 'error');
            return;
        }
        if (newPassword !== confirm) {
            showMessage('兩次輸入的密碼不一致', 'error');
            return;
        }

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message + '，即將跳轉至登入頁', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } else {
                showMessage(data.error || '重設失敗，請重新嘗試', 'error');
            }
        } catch (err) {
            showMessage('網路錯誤，請稍後再試', 'error');
        }
    });

    function showMessage(msg, type) {
        messageBox.textContent = msg;
        messageBox.className = `message ${type}`;
        setTimeout(() => {
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        }, 5000);
    }
</script>
</body>
</html>
