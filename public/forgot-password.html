<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>忘記密碼 - 餐廳點餐系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }
        .header {
            background: white;
            padding: 32px 24px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #005F73;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 0.9rem;
        }
        .body {
            padding: 32px 28px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #005F73;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 28px;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #005F73;
            box-shadow: 0 0 0 3px rgba(0,95,115,0.1);
        }
        button {
            width: 100%;
            background: #005F73;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #004a5a;
            transform: translateY(-2px);
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: #005F73;
            text-decoration: none;
            font-weight: bold;
        }
        .message {
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔐 忘記密碼</h1>
        <p>請輸入您的帳號與註冊信箱</p>
    </div>
    <div class="body">
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>帳號</label>
            <input type="text" id="username" placeholder="請輸入帳號" autocomplete="off">
        </div>
        <div class="form-group">
            <label>電子信箱</label>
            <input type="email" id="email" placeholder="your@example.com" autocomplete="off">
        </div>
        <button id="sendBtn">驗證並重設密碼</button>
        <div class="back-link">
            <a href="login.html">← 返回登入</a>
        </div>
    </div>
</div>
<script>
    const sendBtn = document.getElementById('sendBtn');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const messageBox = document.getElementById('messageBox');

    sendBtn.addEventListener('click', async () => {
        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        if (!username || !email) {
            showMessage('請填寫帳號和電子信箱', 'error');
            return;
        }
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            showMessage('請輸入有效的電子信箱', 'error');
            return;
        }

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email })
            });
            const data = await res.json();
            if (res.ok) {
                // 直接跳轉到重設密碼頁面，附帶 token
                window.location.href = `reset-password.html?token=${data.token}`;
            } else {
                showMessage(data.error || '帳號或信箱不正確', 'error');
            }
        } catch (err) {
            showMessage('網路錯誤，請稍後再試', 'error');
        }
    });

    function showMessage(msg, type) {
        messageBox.textContent = msg;
        messageBox.className = `message ${type}`;
        setTimeout(() => {
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        }, 5000);
    }
</script>
</body>
</html>
