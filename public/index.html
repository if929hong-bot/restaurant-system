<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>餐廳點餐系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            color: #023047;
            margin-bottom: 12px;
        }
        .subtitle {
            color: #4a627a;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            padding: 20px 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }
        .card-info {
            text-align: left;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #023047;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.85rem;
            color: #5b6e8c;
        }
        .card-arrow {
            font-size: 1.5rem;
            color: #023047;
        }
        @media (max-width: 480px) {
            .card { padding: 16px; }
            .card-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🍽️</div>
    <h1>餐廳點餐系統</h1>
    <div class="subtitle">快速連結</div>
    <div class="card-grid">
        <a href="order.html?store=demo_restaurant" class="card">
            <div class="card-info">
                <div class="card-title">顧客點餐</div>
                <div class="card-desc">瀏覽菜單、加入購物車、送出訂單</div>
            </div>
            <div class="card-arrow">→</div>
        </a>
        <a href="login.html" class="card">
            <div class="card-info">
                <div class="card-title">店長 / 管理員登入</div>
                <div class="card-desc">登入後台管理訂單、菜單、店鋪設定</div>
            </div>
            <div class="card-arrow">→</div>
        </a>
        <a href="register.html" class="card">
            <div class="card-info">
                <div class="card-title">店長註冊</div>
                <div class="card-desc">申請成為合作店家，等待審核</div>
            </div>
            <div class="card-arrow">→</div>
        </a>
    </div>
</div>
</body>
</html>
