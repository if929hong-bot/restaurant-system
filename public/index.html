<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>餐廳點餐系統 - 選擇餐廳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            position: relative;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #023047;
            margin-bottom: 12px;
        }
        .header p {
            color: #4a627a;
            font-size: 1.1rem;
        }
        .admin-links {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 16px;
        }
        .admin-links a {
            background: white;
            color: #023047;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid #e2e8f0;
        }
        .admin-links a:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }
        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }
        .restaurant-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .restaurant-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
        }
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #e2e8f0;
        }
        .card-content {
            padding: 20px;
        }
        .restaurant-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #023047;
            margin-bottom: 8px;
        }
        .restaurant-username {
            color: #6c757d;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .order-btn {
            display: inline-block;
            background: #ff6b35;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 12px;
            transition: 0.2s;
        }
        .restaurant-card:hover .order-btn {
            background: #e55a2b;
        }
        .loading, .empty {
            text-align: center;
            padding: 60px;
            color: #6c757d;
            font-size: 1.1rem;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            .restaurant-grid { gap: 16px; }
            .header h1 { font-size: 1.8rem; }
            .admin-links { position: static; justify-content: center; margin-bottom: 20px; }
            .header { padding-top: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="admin-links">
            <a href="login.html">🔐 店長登入</a>
            <a href="register.html">📝 店長註冊</a>
        </div>
        <h1>🍽️ 線上點餐</h1>
        <p>選擇您喜愛的餐廳，開始點餐</p>
    </div>
    <div id="restaurantList" class="restaurant-grid">
        <div class="loading">載入餐廳列表中...</div>
    </div>
    <div class="footer">
        <p>© 2025 餐廳點餐系統 | 店家進駐請聯繫管理員</p>
    </div>
</div>

<script>
    async function loadStores() {
        const container = document.getElementById('restaurantList');
        try {
            const res = await fetch('/api/stores');
            if (!res.ok) throw new Error('無法載入店家資料');
            const stores = await res.json();
            if (stores.length === 0) {
                container.innerHTML = '<div class="empty">目前尚無合作餐廳，請稍後再來 😊</div>';
                return;
            }
            container.innerHTML = '';
            stores.forEach(store => {
                const card = document.createElement('a');
                card.className = 'restaurant-card';
                card.href = `order.html?store=${encodeURIComponent(store.username)}`;
                const bgImage = store.background_image_url || 'https://picsum.photos/id/20/400/200';
                card.innerHTML = `
                    <img class="card-img" src="${bgImage}" alt="${escapeHtml(store.restaurant_name)}">
                    <div class="card-content">
                        <div class="restaurant-name">${escapeHtml(store.restaurant_name || store.username)}</div>
                        <div class="restaurant-username">@${escapeHtml(store.username)}</div>
                        <div class="order-btn">立即點餐 →</div>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="empty">載入失敗，請稍後再試</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    loadStores();
</script>
</body>
</html>
